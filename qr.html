<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CekSINTA — Proses Pembayaran</title>
  <script src="https://app.sandbox.midtrans.com/snap/snap.js"
    data-client-key="Mid-client-I_iBVTOjLpmjYjOj"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#F0FDF9;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px 16px;
    }
    .card{
      background:#fff;border-radius:20px;border:1px solid #D1FAE5;
      width:100%;max-width:400px;overflow:hidden;
      box-shadow:0 4px 24px rgba(0,0,0,.06);
    }
    .header{
      background:linear-gradient(135deg,#0D9488,#059669);
      padding:16px 20px;display:flex;align-items:center;gap:10px;
    }
    .logo{
      width:32px;height:32px;border-radius:8px;
      background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:#fff;
    }
    .h-title{font-size:14px;font-weight:600;color:#fff}
    .h-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
    .body{padding:28px 24px;text-align:center}
    .spinner{
      width:36px;height:36px;border-radius:50%;
      border:3px solid #D1FAE5;border-top-color:#0D9488;
      animation:spin .8s linear infinite;margin:0 auto 16px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:13px;color:#6B7280;line-height:1.6}

    /* Summary box */
    .summary{
      background:#F0FDF9;border:1px solid #D1FAE5;border-radius:12px;
      padding:14px 16px;margin-bottom:20px;text-align:left;
    }
    .sum-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #E8FDF5}
    .sum-row:last-child{border-bottom:none;font-weight:700;font-size:13px;color:#0D9488}
    .sum-key{color:#6B7280}
    .sum-val{color:#111827;font-weight:600}

    /* Error */
    .err-box{
      background:#FEE2E2;border-radius:10px;padding:14px;
      margin-bottom:16px;
    }
    .err-title{font-size:13px;font-weight:700;color:#991B1B;margin-bottom:4px}
    .err-desc{font-size:11px;color:#B91C1C;line-height:1.5}
    .btn-back{
      width:100%;margin-top:12px;padding:11px;
      background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;
      font-size:13px;cursor:pointer;font-family:inherit;color:#374151;
    }
    .note{font-size:10px;color:#9CA3AF;text-align:center;margin-top:14px;line-height:1.5}
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">Ck</div>
    <div>
      <div class="h-title">Proses Pembayaran</div>
      <div class="h-sub" id="headerSub">Memuat...</div>
    </div>
  </div>
  <div class="body">
    <div id="stateLoading">
      <!-- Summary -->
      <div class="summary" id="summaryBox" style="display:none">
        <div class="sum-row"><span class="sum-key">Paket</span><span class="sum-val" id="sumPlan">—</span></div>
        <div class="sum-row"><span class="sum-key">Periode</span><span class="sum-val" id="sumPeriod">—</span></div>
        <div class="sum-row"><span class="sum-key">Total</span><span class="sum-val" id="sumTotal">—</span></div>
      </div>
      <div class="spinner"></div>
      <div class="loading-text">Menyiapkan pembayaran aman...<br/>Jangan tutup halaman ini.</div>
    </div>
    <div id="stateError" style="display:none">
      <div class="err-box">
        <div class="err-title">Gagal memuat pembayaran</div>
        <div class="err-desc" id="errMsg">Terjadi kesalahan. Silakan coba lagi.</div>
      </div>
      <button class="btn-back" onclick="history.back()">← Kembali pilih metode bayar</button>
    </div>
  </div>
</div>
<p class="note">Pembayaran diproses aman oleh Midtrans (lisensi Bank Indonesia).<br>Pro aktif otomatis setelah dikonfirmasi.</p>

<script>
const API_BASE = "";

// Label paket
const PLAN_LABELS = {
  scholar:    'Scholar',
  researcher: 'Researcher',
  dosenpro:   'Dosen Pro',
  monthly:    'Bulanan',
  semester:   'Semester (6 bln)',
  yearly:     'Tahunan (12 bln)',
};

// Ambil & validasi semua parameter dari URL
const params   = new URLSearchParams(window.location.search);
let uid        = params.get('uid')      || '';
const plan     = params.get('plan')     || 'researcher';
const priceId  = params.get('price_id') || 'monthly';
const orderId  = params.get('order_id') || '';
const amount   = parseInt(params.get('amount') || '0');
const method   = params.get('method')   || 'qris';

// Auto-generate uid jika kosong (fallback safety)
if (!uid) uid = 'usr_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

// Validasi
const missing = [];
if (!orderId) missing.push('order_id');
if (!amount || amount < 1000) missing.push('amount');

// Tampilkan summary
document.getElementById('headerSub').textContent =
  (PLAN_LABELS[plan] || plan) + ' · ' + (PLAN_LABELS[priceId] || priceId);

function showSummary() {
  document.getElementById('sumPlan').textContent   = PLAN_LABELS[plan]    || plan;
  document.getElementById('sumPeriod').textContent = PLAN_LABELS[priceId] || priceId;
  document.getElementById('sumTotal').textContent  = 'Rp ' + amount.toLocaleString('id-ID');
  document.getElementById('summaryBox').style.display = 'block';
}

function showError(msg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display   = 'block';
  document.getElementById('errMsg').textContent = msg;
}

async function initPayment() {
  if (missing.length > 0) {
    showError('Data tidak lengkap: ' + missing.join(', ') + '. Kembali dan coba lagi.');
    return;
  }

  showSummary();

  try {
    const res = await fetch(`/api/create-token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid, plan, price_id: priceId, order_id: orderId, amount, method }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();
    if (!data.snap_token) throw new Error('Snap token tidak ditemukan dari server.');

    document.getElementById('stateLoading').querySelector('.spinner').style.display = 'none';
    document.getElementById('stateLoading').querySelector('.loading-text').textContent = 'Membuka jendela pembayaran...';

    window.snap.pay(data.snap_token, {
      onSuccess: () => {
        window.location.href = `success.html?uid=${encodeURIComponent(uid)}&plan=${plan}&price_id=${priceId}&order_id=${encodeURIComponent(orderId)}&amount=${amount}`;
      },
      onPending: () => {
        window.location.href = `success.html?uid=${encodeURIComponent(uid)}&plan=${plan}&price_id=${priceId}&order_id=${encodeURIComponent(orderId)}&amount=${amount}&status=pending`;
      },
      onError: () => showError('Pembayaran gagal atau dibatalkan. Silakan kembali dan coba lagi.'),
      onClose: () => {
        document.getElementById('stateLoading').querySelector('.spinner').style.display = 'none';
        document.getElementById('stateLoading').querySelector('.loading-text').textContent = 'Jendela pembayaran ditutup.';
        showError('Pembayaran dibatalkan. Klik tombol di bawah untuk kembali.');
      },
    });

  } catch (err) {
    console.error(err);
    showError(err.message || 'Gagal menghubungi server pembayaran. Coba lagi beberapa saat.');
  }
}

initPayment();
</script>
</body>
</html>
